# Builds a static review dashboard and deploys it to GitHub Pages.
#
# The dashboard shows open PRs labelled "review-ready" or "discussion-needed"
# across all ROSA HyperFleet repositories.
#
# Setup:
#   1. In repo Settings > Pages, set Source to "GitHub Actions".
#   2. (Optional) To include rosa-hyperfleet-internal, create a
#      fine-grained PAT with "Pull Requests: read" permission on all 4 repos
#      and add it as a repository secret named DASHBOARD_TOKEN.
#      Without it, only the 3 public repos are queried.
name: Review Dashboard

on:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Fetch PR data
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_TOKEN || github.token }}
        run: ./dashboard/fetch-data.sh

      - name: Check for changes
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Hash the PR data (excluding the updated timestamp which changes every run)
          new_hash=$(jq -S '{review_ready, discussion_needed, needs_ok_to_test}' dashboard/data.json | sha256sum | cut -d' ' -f1)

          # Fetch the currently deployed data.json and hash it the same way
          old_hash=""
          deployed=$(curl -sf "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-dashboard/data.json" 2>/dev/null) && \
            old_hash=$(echo "$deployed" | jq -S '{review_ready, discussion_needed, needs_ok_to_test}' | sha256sum | cut -d' ' -f1) || true

          echo "old=$old_hash new=$new_hash"
          if [ "$new_hash" = "$old_hash" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected, skipping deployment."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected, deploying."
          fi

      - name: Build site
        if: steps.diff.outputs.changed == 'true'
        run: |
          mkdir -p _site/pr-dashboard
          cp dashboard/index.html _site/pr-dashboard/index.html
          cp dashboard/data.json _site/pr-dashboard/data.json

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        if: steps.diff.outputs.changed == 'true'
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        if: steps.diff.outputs.changed == 'true'
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        if: steps.diff.outputs.changed == 'true'

      - name: Clean up old deployments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cutoff=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          gh api "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=100" \
            --paginate -q ".[] | select(.created_at < \"$cutoff\") | .id" | \
          while read -r id; do
            gh api "repos/${{ github.repository }}/deployments/$id/statuses" \
              -f state=inactive --silent || true
            gh api "repos/${{ github.repository }}/deployments/$id" -X DELETE --silent || true
          done
