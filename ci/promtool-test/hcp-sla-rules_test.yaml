evaluation_interval: 1m

rule_files:
  - rules.yaml

tests:
  # Recording rule: returns 1 when HostedCluster Available condition is True
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x10"
    promql_expr_test:
      - expr: hcp:hostedcluster_available{name="test-hcp"}
        eval_time: 5m
        exp_samples:
          - labels: 'hcp:hostedcluster_available{namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
            value: 1

  # Recording rule: returns 0 when HostedCluster condition is False.
  # All three StateSet series are present simultaneously — only status="True" value changes.
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="False", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x10"
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="Unknown", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
    promql_expr_test:
      - expr: hcp:hostedcluster_available{name="test-hcp"}
        eval_time: 5m
        exp_samples:
          - labels: 'hcp:hostedcluster_available{namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
            value: 0

  # Fast burn alert fires at 100% downtime after 5m window + 1m for duration = ~6m
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts:
          - exp_labels:
              severity: critical
              long_window: 5m
              short_window: 2m
              namespace: clusters-test
              name: test-hcp
              cluster: mc-1
            exp_annotations:
              summary: "HCP availability error budget burning fast"
              description: "HostedCluster test-hcp in namespace clusters-test on cluster mc-1 is consuming its 30-day availability error budget at 14.4x the sustainable rate."

  # Fast burn alert does NOT fire at normal availability
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x10"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts: []

  # Slow burn alert fires at 100% downtime after 30m window + 2m for duration = ~32m
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x35"
    alert_rule_test:
      - eval_time: 32m
        alertname: HCPAvailabilityErrorBudgetSlowBurn
        exp_alerts:
          - exp_labels:
              severity: critical
              long_window: 30m
              short_window: 5m
              namespace: clusters-test
              name: test-hcp
              cluster: mc-1
            exp_annotations:
              summary: "HCP availability error budget burning steadily"
              description: "HostedCluster test-hcp in namespace clusters-test on cluster mc-1 is consuming its 30-day availability error budget at 6x the sustainable rate."

  # Slow burn alert does NOT fire at normal availability
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x35"
    alert_rule_test:
      - eval_time: 32m
        alertname: HCPAvailabilityErrorBudgetSlowBurn
        exp_alerts: []

  # Fast burn alert is SUPPRESSED during initial install (never been available, under grace period)
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
      - series: 'hypershift_cluster_waiting_initial_availability_duration_seconds{exported_namespace="clusters-test", name="test-hcp", cluster="mc-1", cluster_type="management-cluster"}'
        values: "60+60x9"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts: []

  # Fast burn alert stays SUPPRESSED even when install exceeds grace period
  # (cluster is still installing — HCPInstallTimeout15m handles this case)
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x20"
      - series: 'hypershift_cluster_waiting_initial_availability_duration_seconds{exported_namespace="clusters-test", name="test-hcp", cluster="mc-1", cluster_type="management-cluster"}'
        values: "901+60x19"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts: []

  # HCPInstallTimeout15m fires when cluster has never been available for > 900s
  - interval: 1m
    input_series:
      - series: 'hypershift_cluster_waiting_initial_availability_duration_seconds{exported_namespace="clusters-test", name="test-hcp", cluster="mc-1", cluster_type="management-cluster"}'
        values: "901+60x5"
    alert_rule_test:
      - eval_time: 2m
        alertname: HCPInstallTimeout15m
        exp_alerts:
          - exp_labels:
              severity: warning
              exported_namespace: clusters-test
              namespace: clusters-test
              name: test-hcp
              cluster: mc-1
              cluster_type: management-cluster
            exp_annotations:
              summary: "HCP install has not become available within 15 minutes"
              description: "HostedCluster test-hcp in namespace clusters-test on cluster mc-1 has never become available and has been waiting for over 15 minutes."

  # HCPInstallTimeout15m does NOT fire during normal grace period
  - interval: 1m
    input_series:
      - series: 'hypershift_cluster_waiting_initial_availability_duration_seconds{exported_namespace="clusters-test", name="test-hcp", cluster="mc-1", cluster_type="management-cluster"}'
        values: "60+60x9"
    alert_rule_test:
      - eval_time: 5m
        alertname: HCPInstallTimeout15m
        exp_alerts: []

  # Fast burn alert is SUPPRESSED during cluster deletion
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
      - series: 'hypershift_cluster_deleting_duration_seconds{exported_namespace="clusters-test", name="test-hcp", cluster="mc-1", cluster_type="management-cluster"}'
        values: "30+30x9"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts: []
