# aws-nuke configuration for ROSA HyperFleet CI accounts.
#
# Reference: https://github.com/ekristen/aws-nuke (v3)

regions:
  - us-east-1
  - global

# Exclude deprecated/unavailable AWS service resource types whose API endpoints
# hang during scanning. We don't use these services and can't delete them anyway.
resource-types:
  excludes:
    - ElasticTranscoderPipeline
    - ElasticTranscoderPreset
    - OpsWorksUserProfile
    - OpsWorksCMServer
    - OpsWorksCMBackup
    - CodeStarProject
    - CodeStarNotificationRule
    - RoboMakerSimulationApplication
    - RoboMakerRobotApplication
    - Cloud9Environment
    - MachineLearningMLModel
    - MachineLearningDataSource
    - MachineLearningEvaluation
    - MachineLearningBranchPrediction
    - MachineLearningBatchPrediction

# Needed but not used.
blocklist:
  - prod

presets:
  globals:
    filters:
      __global__:
        # Exclude all app-sre-infra resources
        - property: tag:app
          value: "app-sre-infra"
        # Global filter to ignore resources
        - property: "tag:platform-janitor/lifecycle"
          value: "ignore"
      S3Object:
        - property: BucketName
          type: regex
          value: "terraform-.*"
        - property: Bucket
          type: regex
          value: "terraform-.*"
      IAMUser:
        - terraform
      IAMUserAccessKey: &terraform-user-filters
        - property: UserName
          value: "terraform"
      IAMUserPolicyAttachment: *terraform-user-filters

      # Exclude default VPC things
      EC2VPC:
        - property: IsDefault
          value: "true"
      EC2Subnet: &default-vpc-filter
        - property: DefaultVPC
          value: "true"
      EC2InternetGateway: *default-vpc-filter
      EC2RouteTable: *default-vpc-filter
      EC2DHCPOption: *default-vpc-filter
      EC2SecurityGroup: *default-vpc-filter
      EC2DefaultSecurityGroupRule: *default-vpc-filter
      EC2InternetGatewayAttachment: *default-vpc-filter
      EC2NetworkACL: *default-vpc-filter

      # Exclude Cloudtrails
      CloudTrailTrail: &glob-all
        - type: glob
          value: "*"

      # Exclude OrgAdminAccessRole and ResourceExplorer roles
      IAMRole:
        - "OrganizationAccountAccessRole"
        - property: Name
          type: contains
          value: "ResourceExplorerRole"
      IAMRolePolicyAttachment:
        - property: RoleName
          value: "OrganizationAccountAccessRole"
        - property: RoleName
          type: contains
          value: "ResourceExplorerRole"
      IAMRolePolicy:
        - property: RoleName
          value: "OrganizationAccountAccessRole"
        - property: RoleName
          type: contains
          value: "ResourceExplorerRole"
      IAMSAMLProvider: &glob-name-all
        - property: Name
          type: glob
          value: "*"

      # Exclude Resource Explorer
      ResourceExplorer2View: *glob-name-all
      ResourceExplorer2Index: *glob-name-all

  # Preserve CI identity: IAM users "e2e", "ci", and "chai-bot-s3-reader"
  ci:
    filters:
      IAMUser:
        - "e2e"
        - "ci"
        - "chai-bot-s3-reader"
      IAMUserAccessKey: &ci-user-filters
        - property: UserName
          value: "e2e"
        - property: UserName
          value: "ci"
        - property: UserName
          value: "chai-bot-s3-reader"
      IAMUserPolicyAttachment: *ci-user-filters
      IAMUserPolicy: *glob-all
      IAMUserGroupAttachment: *ci-user-filters
      IAMLoginProfile:
        - "e2e"
      IAMRole:
        - "ci"
        - property: Path
          type: glob
          value: "/aws-service-role/*"
        - property: Name
          type: regex
          value: "rosa-regional-.*"
      IAMRolePolicyAttachment:
        - property: RoleName
          type: glob
          value: "AWSServiceRoleFor*"
        - property: RoleName
          value: "ci"
      IAMRolePolicy:
        - property: RoleName
          type: glob
          value: "AWSServiceRoleFor*"
        - property: role:RoleName
          type: regex
          value: "rosa-regional-.*"
      ECRRepository:
        - property: RepositoryName
          type: glob
          value: "e2e-platform-*"
      Route53HostedZone: *glob-name-all
      CodeBuildSourceCredential: *glob-name-all

  # Preserve CodeStar connection for central accounts
  central:
    filters:
      CodeStarConnection:
        - "rosa-regional-github-shared"

  # Preserve shared-dev identity and roles
  shared-dev:
    filters:
      IAMUser:
        - "shared-dev"
      IAMUserAccessKey: &shared-dev-user-filters
        - property: UserName
          value: "shared-dev"
      IAMUserPolicyAttachment: *shared-dev-user-filters
      IAMUserGroupAttachment: *shared-dev-user-filters
      IAMLoginProfile:
        - "shared-dev"
      IAMRole:
        - "shared-dev-role"
      IAMRolePolicyAttachment:
        - property: RoleName
          value: "shared-dev-role"
      IAMRolePolicy:
        - property: role:RoleName
          value: "shared-dev-role"

  # Preserve SSM pull-secret for management clusters
  mc:
    filters:
      SSMParameter:
        - "/infra/pull-secret"

  # Preserve HCP customer identity and roles
  customer:
    filters:
      IAMUser:
        - "rrp-hcp-customer"
      IAMUserAccessKey:
        - property: UserName
          value: "rrp-hcp-customer"
      IAMUserPolicyAttachment:
        - property: UserName
          value: "rrp-hcp-customer"

accounts:
  # CI accounts
  "662212752128":
    presets: [globals, ci, central]
  "720644165472":
    presets: [globals, ci]
  "129678139271":
    presets: [globals, ci, mc]
  "313828097858":
    presets: [globals, ci, customer]

  # Shared Dev accounts
  "791666871613":
    presets: [globals, ci, shared-dev, central]
  "599476212575":
    presets: [globals, ci, shared-dev]
  "855246887846":
    presets: [globals, ci, shared-dev, mc]
  "114594328247":
    presets: [globals, ci, shared-dev, customer]

  # Integration Customer Account 
  "206641868149":
    presets: [globals, ci, shared-dev, customer]

settings:
  # Disable deletion protection on resources that may have it enabled
  # from failed terraform runs, so aws-nuke can delete them.
  RDSInstance:
    DisableDeletionProtection: true
  DynamoDBTable:
    DisableDeletionProtection: true
