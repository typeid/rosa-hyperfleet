namespace: zoa-jobs

serviceAccounts:
  uploader:
    name: zoa-uploader
    description: "S3 uploader — reads output ConfigMap and uploads artifacts to S3"
  awsRead:
    name: zoa-aws-read
    description: "AWS read TAs — describe, list, get against AWS APIs"
  awsWrite:
    name: zoa-aws-write
    description: "AWS write TAs — modify, restart, scale via AWS APIs"
  breakglassRead:
    name: zoa-breakglass-read
    description: "Breakglass read operations — broad read AWS access"
  breakglassWrite:
    name: zoa-breakglass-write
    description: "Breakglass write operations — broad write AWS access"

labels:
  managed-by: zoa
  part-of: rosa-hyperfleet
