# Default values for hypershift-install chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# All values are namespaced under 'hypershift' to maintain consistency
# with the rendering system and avoid conflicts with other charts
hypershift:
  # AWS region — used by the ASCP SecretProviderClass to fetch from Secrets Manager
  region: us-east-1

  # External DNS domain filter — set from config via render.py
  externalDns:
    domain: ""
    # TODO(ROSAENG-1088): Remove this override once the Red Hat external-dns
    # build (edo/external-dns-rhel8) bumps aws-sdk-go to >= v1.52 for Pod Identity.
    image: registry.k8s.io/external-dns/external-dns:v0.21.0

  # Hypershift configuration
  hypershift:
    image: quay.io/acm-d/rhtap-hypershift-operator@sha256:428c9ec9e24dfcedc608931fa4467bfc7af2b9c0c746fe2d14c1409047ef509c
