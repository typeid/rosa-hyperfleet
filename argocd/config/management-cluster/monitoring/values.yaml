kube-prometheus-stack:
  nameOverride: "monitoring"
  namespaceOverride: "monitoring"

  crds:
    enabled: false

  defaultRules:
    create: false

  # Since these are not interactive clusters, we can turn off grafana
  # and alertmanager. All of these metrics will be forwarded into RHOBS
  alertmanager:
    enabled: false
  grafana:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

  kube-state-metrics:
    rbac:
      extraRules:
        - apiGroups: ["hypershift.openshift.io"]
          resources: ["hostedclusters"]
          verbs: ["list", "watch"]
    customResourceState:
      enabled: true
      config:
        kind: CustomResourceStateMetrics
        spec:
          resources:
            - groupVersionKind:
                group: hypershift.openshift.io
                version: v1beta1
                kind: HostedCluster
              labelsFromPath:
                name: [metadata, name]
                namespace: [metadata, namespace]
              metrics:
                - name: "hostedcluster_status_condition"
                  help: "Status conditions for HostedCluster resources"
                  each:
                    type: StateSet
                    stateSet:
                      labelName: status
                      path: [status, conditions]
                      labelsFromPath:
                        type: [type]
                      list: ["True", "False", "Unknown"]
                      valueFrom: [status]
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

  prometheus:
    prometheusSpec:
      replicas: 2
      retention: "14d"
      retentionSize: "85GB"
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi

      serviceMonitorNamespaceSelector: {}
      serviceMonitorSelector: {}

      # -------------------------------------------------------------------
      # Remote Write via sigv4-proxy service
      #
      # The prometheus-operator CRD does not expose sigv4.serviceName,
      # which defaults to "aps" (Amazon Managed Prometheus). For API
      # Gateway we need "execute-api". Workaround: point remote_write at
      # the sigv4-proxy service which handles signing correctly.
      #
      # Cluster identity is carried by externalLabels below, not by
      # Thanos tenant headers. All metrics share the default tenant.
      # -------------------------------------------------------------------
      externalLabels:
        cluster: '{{ required "global.cluster_name is required" .Values.global.cluster_name }}'
        cluster_type: '{{ .Values.global.cluster_type | default "management" }}'
      remoteWrite:
        - url: "http://sigv4-proxy.monitoring.svc:8005/prod/api/v1/receive"

      # This prevents us from scheduling prometheus pods within the same AZ,
      # so that we have at least one zone with a replica
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus

      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: prometheus-data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
