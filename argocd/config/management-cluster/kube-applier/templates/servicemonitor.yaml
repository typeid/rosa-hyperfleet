{{- if .Values.kubeApplier.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kube-applier.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-applier.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kube-applier.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.kubeApplier.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.kubeApplier.metrics.serviceMonitor.scrapeTimeout }}
      path: /metrics
{{- end }}
