apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-applier.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-applier.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kubeApplier.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "kube-applier.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "kube-applier.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kube-applier.serviceAccountName" . }}
      containers:
        - name: kube-applier
          image: "{{ .Values.kubeApplier.image.registry }}/{{ .Values.kubeApplier.image.repository }}:{{ .Values.kubeApplier.image.tag }}"
          imagePullPolicy: {{ .Values.kubeApplier.image.pullPolicy }}
          args:
            - --management-cluster={{ .Values.global.cluster_name }}
            - --aws-region={{ .Values.global.aws_region }}
            - --namespace={{ .Release.Namespace }}
            - --specs-table=arn:aws:dynamodb:{{ .Values.global.aws_region }}:{{ .Values.global.rc_aws_account_id }}:table/{{ .Values.global.cluster_name }}-specs
            - --status-table=arn:aws:dynamodb:{{ .Values.global.aws_region }}:{{ .Values.global.rc_aws_account_id }}:table/{{ .Values.global.cluster_name }}-status
            - --metrics-listen-address={{ .Values.kubeApplier.config.metricsListenAddress }}
            - --healthz-listen-address={{ .Values.kubeApplier.config.healthzListenAddress }}
            - --leader-election-id={{ .Values.kubeApplier.config.leaderElectionId }}
            - --log-verbosity={{ .Values.kubeApplier.config.logVerbosity }}
            - --exit-on-panic={{ .Values.kubeApplier.config.exitOnPanic }}
            {{- if .Values.kubeApplier.config.awsEndpointUrl }}
            - --aws-endpoint-url={{ .Values.kubeApplier.config.awsEndpointUrl }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ trimPrefix ":" .Values.kubeApplier.config.metricsListenAddress | int }}
              protocol: TCP
            - name: healthz
              containerPort: {{ trimPrefix ":" .Values.kubeApplier.config.healthzListenAddress | int }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.kubeApplier.deployment.resources.requests.cpu | quote }}
              memory: {{ .Values.kubeApplier.deployment.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.kubeApplier.deployment.resources.limits.cpu | quote }}
              memory: {{ .Values.kubeApplier.deployment.resources.limits.memory | quote }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
