apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.platformApi.app.name }}
  namespace: {{ .Values.platformApi.namespace }}
  labels:
    app: {{ .Values.platformApi.app.name }}
spec:
  replicas: {{ .Values.platformApi.deployment.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.platformApi.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.platformApi.app.name }}
      annotations:
        checksum/zoa-job-config: {{ include (print $.Template.BasePath "/zoa-job-config-configmap.yaml") . | sha256sum }}
        checksum/zoa-ta-templates: {{ include (print $.Template.BasePath "/zoa-templates-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.platformApi.serviceAccount.name }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Values.platformApi.app.name }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Values.platformApi.app.name }}
      containers:
        - name: {{ .Values.platformApi.app.name }}
          image: {{ .Values.platformApi.app.image.repository }}:{{ .Values.platformApi.app.image.tag }}
          imagePullPolicy: {{ .Values.platformApi.app.image.pullPolicy }}
          args:
            - serve
            - --log-level={{ .Values.platformApi.app.args.logLevel }}
            - --log-format={{ .Values.platformApi.app.args.logFormat }}
            - --allowed-accounts={{ .Values.platformApi.app.args.allowedAccounts }}
            - --api-port={{ .Values.platformApi.app.args.apiPort }}
            - --health-port={{ .Values.platformApi.app.args.healthPort }}
            - --metrics-port={{ .Values.platformApi.app.args.metricsPort }}
            - --dynamodb-region={{ .Values.platformApi.app.args.dynamodbRegion }}
            - --dynamodb-prefix={{ .Values.platformApi.app.args.dynamodbPrefix }}
            {{- if .Values.platformApi.app.args.oidcIssuerBaseURL }}
            - --oidc-issuer-base-url={{ .Values.platformApi.app.args.oidcIssuerBaseURL }}
            {{- end }}
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platformApi.hyperfleetdb.secretName | default "hyperfleet-db-dsn" }}
                  key: {{ .Values.platformApi.hyperfleetdb.secretKey | default "dsn" }}
            {{- if .Values.platformApi.zoa.enabled }}
            - name: ZOA_ENABLED
              value: "true"
            - name: ZOA_TABLE_NAME
              value: {{ .Values.platformApi.zoa.tableName | quote }}
            - name: ZOA_BUCKET_NAME
              value: {{ .Values.platformApi.zoa.bucketName | quote }}
            - name: ZOA_AUDIT_TABLE_NAME
              value: {{ .Values.platformApi.zoa.auditTableName | quote }}
            - name: ZOA_TEMPLATES_DIR
              value: /etc/zoa/templates
            - name: ZOA_JOB_CONFIG_DIR
              value: /etc/zoa/job-config
            {{- end }}
          {{- if .Values.platformApi.zoa.enabled }}
          volumeMounts:
            - name: zoa-templates
              mountPath: /etc/zoa/templates
              readOnly: true
            - name: zoa-job-config
              mountPath: /etc/zoa/job-config
              readOnly: true
          {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.platformApi.app.args.apiPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.platformApi.app.args.healthPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.platformApi.app.args.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.platformApi.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.platformApi.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.platformApi.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.platformApi.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: {{ .Values.platformApi.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.platformApi.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.platformApi.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.platformApi.probes.readiness.failureThreshold }}
          resources:
            requests:
              cpu: {{ .Values.platformApi.app.resources.requests.cpu }}
              memory: {{ .Values.platformApi.app.resources.requests.memory }}
            limits:
              cpu: {{ .Values.platformApi.app.resources.limits.cpu }}
              memory: {{ .Values.platformApi.app.resources.limits.memory }}
        - name: envoy
          image: {{ .Values.platformApi.envoy.image.repository }}:{{ .Values.platformApi.envoy.image.tag }}
          ports:
            - containerPort: {{ .Values.platformApi.service.ports.http }}
              name: http
              protocol: TCP
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          command:
            - envoy
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - info
          livenessProbe:
            httpGet:
              path: /v0/live
              port: {{ .Values.platformApi.service.ports.http }}
            initialDelaySeconds: {{ .Values.platformApi.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.platformApi.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /v0/live
              port: {{ .Values.platformApi.service.ports.http }}
            initialDelaySeconds: {{ .Values.platformApi.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.platformApi.probes.readiness.periodSeconds }}
          resources:
            requests:
              cpu: {{ .Values.platformApi.envoy.resources.requests.cpu }}
              memory: {{ .Values.platformApi.envoy.resources.requests.memory }}
            limits:
              cpu: {{ .Values.platformApi.envoy.resources.limits.cpu }}
              memory: {{ .Values.platformApi.envoy.resources.limits.memory }}
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
        {{- if .Values.platformApi.zoa.enabled }}
        - name: zoa-templates
          configMap:
            name: zoa-ta-templates
        - name: zoa-job-config
          configMap:
            name: zoa-job-config
        {{- end }}
