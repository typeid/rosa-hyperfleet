apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hyperfleet-db-dsn
  namespace: {{ .Values.platformApi.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.platformApi.hyperfleetdb.secretName | default "hyperfleet-db-dsn" }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.platformApi.hyperfleetdb.secretKey | default "dsn" }}
      remoteRef:
        key: {{ .Values.global.cluster_name }}-hyperfleet-db-dsn
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
