{{- if .Values.platformApi.zoa.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: zoa-job-config
  namespace: {{ .Values.platformApi.namespace }}
  labels:
    app: {{ .Values.platformApi.app.name }}
    component: zoa
data:
  image: {{ .Values.platformApi.zoa.jobImage | quote }}
  revision: {{ .Values.global.git_revision | default "unknown" | quote }}
  cpu_request: {{ .Values.platformApi.zoa.jobResources.requests.cpu | quote }}
  memory_request: {{ .Values.platformApi.zoa.jobResources.requests.memory | quote }}
  cpu_limit: {{ .Values.platformApi.zoa.jobResources.limits.cpu | quote }}
  memory_limit: {{ .Values.platformApi.zoa.jobResources.limits.memory | quote }}
  ttl_seconds: {{ .Values.platformApi.zoa.ttlSeconds | quote }}
  execution_timeout_seconds: {{ .Values.platformApi.zoa.executionTimeoutSeconds | default "1800" | quote }}
  upload_timeout_seconds: {{ .Values.platformApi.zoa.uploadTimeoutSeconds | default "120" | quote }}
  write_cooldown_seconds: {{ .Values.platformApi.zoa.writeCooldownSeconds | default "300" | quote }}
  max_concurrent_per_target: {{ .Values.platformApi.zoa.maxConcurrentPerTarget | default "10" | quote }}
  dynamodb_ttl_days: {{ .Values.platformApi.zoa.dynamodbTTLDays | default "365" | quote }}
  entrypoint.sh: |
    #!/bin/bash
    set -euo pipefail

    ts() { date -u '+%H:%M:%S'; }
    EXEC_LOG="/artifacts/execution.log"

    set +o pipefail
    {
      echo "[$(ts)] runner starting"
      echo "[zoa] execution_id=${RUN_ID} action=${ACTION_NAME} target=${CLUSTER_ID}"
      echo "[zoa] operator=${OPERATOR} scope=${SCOPE} type=${TYPE}"
      echo "[zoa] revision=${REVISION}"
      PARAMS=$(env | grep "^PARAM_" | sed 's/^PARAM_//' | tr '\n' ' ') || true
      [ -n "$PARAMS" ] && echo "[zoa] params=${PARAMS}"
      echo "[zoa] started_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      echo "---"
      /zoa/run.sh
      exit $?
    } 2>&1 | tee "$EXEC_LOG"
    EXIT_CODE=${PIPESTATUS[0]}
    set -o pipefail

    {
      echo "---"
      echo "[$(ts)] exit_code=${EXIT_CODE}"
      echo "[$(ts)] patching configmap"
    } | tee -a "$EXEC_LOG"

    OUTPUT_CM="${OUTPUT_CONFIGMAP:-}"
    if [ -z "${OUTPUT_CM}" ]; then
      echo "[$(ts)] ERROR: OUTPUT_CONFIGMAP not set" | tee -a "$EXEC_LOG"
      exit ${EXIT_CODE}
    fi

    # --- Output size validation ---
    # ConfigMap limit is 1MiB. Base64 inflates by 4/3. Safe raw budget: 700KB combined.
    BUDGET=700000
    LOG_SIZE=$(stat -c%s "$EXEC_LOG")
    OUT_SIZE=0
    [ -f /artifacts/output.json ] && OUT_SIZE=$(stat -c%s /artifacts/output.json)
    COMBINED=$((LOG_SIZE + OUT_SIZE))

    if [ "$COMBINED" -gt "$BUDGET" ]; then
      echo "[$(ts)] WARNING: combined output too large (${COMBINED} > ${BUDGET} bytes), truncating" | tee -a "$EXEC_LOG"
      if [ "$OUT_SIZE" -le "$BUDGET" ]; then
        LOG_BUDGET=$((BUDGET - OUT_SIZE))
        { printf '[TRUNCATED: showing last %d of %d bytes]\n' "$LOG_BUDGET" "$LOG_SIZE"
          tail -c "$LOG_BUDGET" "$EXEC_LOG"
        } > /artifacts/truncated.log
        mv /artifacts/truncated.log "$EXEC_LOG"
      else
        OUT_BUDGET=$((BUDGET - 100000))
        { head -c "$OUT_BUDGET" /artifacts/output.json
          printf '\n\n--- TRUNCATED (original: %d bytes, showing first %d) ---\n' "$OUT_SIZE" "$OUT_BUDGET"
        } > /artifacts/truncated_output.json
        mv /artifacts/truncated_output.json /artifacts/output.json
        LOG_BUDGET=100000
        if [ "$LOG_SIZE" -gt "$LOG_BUDGET" ]; then
          { printf '[TRUNCATED: showing last %d of %d bytes]\n' "$LOG_BUDGET" "$LOG_SIZE"
            tail -c "$LOG_BUDGET" "$EXEC_LOG"
          } > /artifacts/truncated.log
          mv /artifacts/truncated.log "$EXEC_LOG"
        fi
      fi
    fi

    LOG_B64=$(base64 -w0 "$EXEC_LOG")
    PATCH_FILE="/tmp/patch.json"

    {
      printf '{"binaryData":{"execution.log":"%s"' "$LOG_B64"
      if [ -f /artifacts/output.json ]; then
        OUTPUT_B64=$(base64 -w0 /artifacts/output.json)
        printf ',"output.json":"%s"' "$OUTPUT_B64"
      fi
      printf '},"data":{"exit-code":"%s"}}' "${EXIT_CODE}"
    } > "$PATCH_FILE"

    PATCH_OK=false
    for attempt in 1 2 3 4 5; do
      if kubectl patch configmap "${OUTPUT_CM}" -n "${JOB_NAMESPACE}" --type=merge --patch-file "$PATCH_FILE" 2>&1; then
        echo "[$(ts)] configmap patched"
        PATCH_OK=true
        break
      fi
      echo "[$(ts)] configmap patch failed (attempt ${attempt}/5), retrying in 3s..."
      sleep 3
    done

    if [ "$PATCH_OK" != "true" ]; then
      echo "[$(ts)] ERROR: failed to patch ConfigMap after 5 attempts"
    fi
    rm -f "$PATCH_FILE"

    exit ${EXIT_CODE}
  upload_entrypoint.sh: |
    #!/bin/bash
    set -euo pipefail

    ts() { date -u '+%H:%M:%S'; }
    ts_at() { date -u -d "@$1" '+%H:%M:%S'; }

    EXEC_TIMEOUT="${EXECUTION_TIMEOUT:-1800}"
    UPLOAD_TIMEOUT="${UPLOAD_TIMEOUT:-120}"
    RUNNER_JOB="${RUNNER_JOB_NAME}"
    OUTPUT_CM="${OUTPUT_CONFIGMAP}"
    BUCKET="${ARTIFACT_BUCKET}"
    NS="${JOB_NAMESPACE}"

    T0=$(date +%s)
    echo "[$(ts_at $T0)] upload starting, waiting for runner (timeout: ${EXEC_TIMEOUT}s)"

    while true; do
      STATUS=$(kubectl get job "${RUNNER_JOB}" -n "${NS}" \
        -o jsonpath='{.status.conditions[?(@.status=="True")].type}' 2>/dev/null) || true
      case "$STATUS" in
        *Complete*|*Failed*) break ;;
      esac
      ELAPSED=$(($(date +%s) - T0))
      if [ "$ELAPSED" -ge "$EXEC_TIMEOUT" ]; then
        echo "[$(ts)] WARNING: runner did not finish within ${EXEC_TIMEOUT}s"
        break
      fi
      sleep 1
    done

    T1=$(date +%s)
    WAIT_S=$((T1 - T0))
    echo "[$(ts_at $T1)] runner done (${WAIT_S}s), reading configmap"

    CM_JSON=$(kubectl get configmap "${OUTPUT_CM}" -n "${NS}" -o json 2>/dev/null) || true
    LOG_B64=$(printf '%s' "$CM_JSON" | jq -r '.binaryData["execution.log"] // empty')
    OUTPUT_B64=$(printf '%s' "$CM_JSON" | jq -r '.binaryData["output.json"] // empty')
    EXIT_CODE=$(printf '%s' "$CM_JSON" | jq -r '.data["exit-code"] // "1"')

    T2=$(date +%s)
    CM_S=$((T2 - T1))
    echo "[$(ts_at $T2)] configmap read (${CM_S}s), decoding"

    if [ -z "${LOG_B64}" ] && [ -z "${OUTPUT_B64}" ]; then
      echo "[$(ts)] ERROR: ConfigMap has no data — runner crashed before writing"
      exit 1
    fi

    mkdir -p /tmp/upload
    if [ -n "${LOG_B64}" ]; then printf '%s' "${LOG_B64}" | base64 -d > /tmp/upload/execution.log; fi
    if [ -n "${OUTPUT_B64}" ]; then printf '%s' "${OUTPUT_B64}" | base64 -d > /tmp/upload/output.json; fi

    T3=$(date +%s)
    DECODE_S=$((T3 - T2))

    UL=/tmp/upload/execution.log
    {
      echo "--- upload ---"
      echo "[$(ts_at $T0)] upload starting"
      echo "[$(ts_at $T1)] runner waited (${WAIT_S}s)"
      echo "[$(ts_at $T2)] configmap read (${CM_S}s)"
      echo "[$(ts_at $T3)] decoded (${DECODE_S}s), uploading to s3"
    } >> "$UL"

    echo "[$(ts)] uploading to s3://${BUCKET}/${RUN_ID}/"
    if aws s3 cp /tmp/upload/ "s3://${BUCKET}/${RUN_ID}/" --recursive 2>&1; then
      echo "[$(ts)] upload done (exit_code=${EXIT_CODE})"
      exit 0
    else
      echo "[$(ts)] WARNING: first upload attempt failed, retrying in 5s..."
      sleep 5
      if aws s3 cp /tmp/upload/ "s3://${BUCKET}/${RUN_ID}/" --recursive 2>&1; then
        echo "[$(ts)] upload done on retry (exit_code=${EXIT_CODE})"
        exit 0
      else
        echo "[$(ts)] ERROR: s3 upload failed after retry"
        exit 1
      fi
    fi
{{- end }}
