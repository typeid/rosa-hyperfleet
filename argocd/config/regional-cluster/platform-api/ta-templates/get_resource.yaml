name: get_resource
scope: kube-api
type: read
description: Generic kubectl get for any resource type, with namespace support and secrets protection for HCP namespaces
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: resource
    required: true
    description: "Resource type to get (e.g. deployments, services, hostedclusters, configmaps)"
  - name: namespace
    required: false
    default: ""
    description: "Namespace for namespace-scoped resources (omit for cluster-scoped)"
  - name: all_namespaces
    required: false
    default: "false"
    description: "List resources across all namespaces (overrides namespace)"
  - name: name
    required: false
    default: ""
    description: "Specific resource name (omit to list all)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter resources (e.g. app=kube-applier)"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  RESOURCE="${PARAM_RESOURCE}"
  NAMESPACE="${PARAM_NAMESPACE:-}"
  NAME="${PARAM_NAME:-}"
  LABEL_SELECTOR="${PARAM_LABEL_SELECTOR:-}"
  ALL_NS="${PARAM_ALL_NAMESPACES:-false}"

  BLOCKED_PREFIXES="clusters-"

  if echo "${RESOURCE}" | grep -iq "^secret"; then
    if [ -n "${NAMESPACE}" ] && echo "${NAMESPACE}" | grep -q "^${BLOCKED_PREFIXES}"; then
      echo "ERROR: Access to secrets in HCP namespaces (${NAMESPACE}) is denied"
      exit 1
    fi
    if [ "${ALL_NS}" = "true" ]; then
      echo "ERROR: Listing secrets across all namespaces is denied"
      exit 1
    fi
  fi

  if [ "${ALL_NS}" = "true" ] && [ -n "${NAME}" ]; then
    echo "ERROR: Cannot use all_namespaces with a specific resource name"
    exit 1
  fi

  ARGS=("${RESOURCE}")

  if [ -n "${NAME}" ]; then
    ARGS+=("${NAME}")
  fi

  if [ "${ALL_NS}" = "true" ]; then
    if [ -n "${NAMESPACE}" ]; then
      echo "WARNING: all_namespaces=true overrides namespace=${NAMESPACE}"
    fi
    ARGS+=(--all-namespaces)
  elif [ -n "${NAMESPACE}" ]; then
    ARGS+=(-n "${NAMESPACE}")
  fi

  if [ -n "${LABEL_SELECTOR}" ]; then
    ARGS+=(-l "${LABEL_SELECTOR}")
  fi

  echo "Running: kubectl get ${ARGS[*]} -o json"
  kubectl get "${ARGS[@]}" -o json > /artifacts/output.json
  echo "Done"
