name: get_pods
scope: kube-api
type: read
description: List or get pods in a namespace with optional label selector
authorization:
  approval: none
timeout_seconds: 300
params:
  - name: namespace
    required: false
    default: ""
    description: "Target namespace to list pods from"
  - name: all_namespaces
    required: false
    default: "false"
    description: "List pods across all namespaces (overrides namespace)"
  - name: name
    required: false
    default: ""
    description: "Specific pod name (omit to list all)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter pods (e.g. app=kube-applier)"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  NAMESPACE_ARGS=()
  if [ "${PARAM_ALL_NAMESPACES:-false}" = "true" ]; then
    if [ -n "${PARAM_NAME:-}" ]; then
      echo "ERROR: Cannot use all_namespaces with a specific resource name"
      exit 1
    fi
    if [ -n "${PARAM_NAMESPACE:-}" ]; then
      echo "WARNING: all_namespaces=true overrides namespace=${PARAM_NAMESPACE}"
    fi
    NAMESPACE_ARGS=(--all-namespaces)
  elif [ -n "${PARAM_NAMESPACE:-}" ]; then
    NAMESPACE_ARGS=(-n "${PARAM_NAMESPACE}")
  else
    echo "ERROR: Specify namespace or set all_namespaces=true"
    exit 1
  fi

  NAME_ARGS=()
  if [ -n "${PARAM_NAME:-}" ]; then
    NAME_ARGS=("${PARAM_NAME}")
  fi

  SELECTOR_ARGS=()
  if [ -n "${PARAM_LABEL_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_LABEL_SELECTOR}")
  fi

  kubectl get pods ${NAME_ARGS[@]+"${NAME_ARGS[@]}"} "${NAMESPACE_ARGS[@]}" ${SELECTOR_ARGS[@]+"${SELECTOR_ARGS[@]}"} -o json > /tmp/raw.json

  if jq -e '.kind | endswith("List")' /tmp/raw.json > /dev/null 2>&1; then
    cp /tmp/raw.json /tmp/list.json
  else
    jq '{items: [.]}' /tmp/raw.json > /tmp/list.json
  fi

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/list.json /artifacts/output.json
  else
    jq '[.items[] | {
      name: .metadata.name,
      namespace: .metadata.namespace,
      ready: (if .status.containerStatuses then ([.status.containerStatuses[] | select(.ready==true)] | length | tostring) + "/" + (.status.containerStatuses | length | tostring) else "0/0" end),
      status: .status.phase,
      restarts: (if .status.containerStatuses then [.status.containerStatuses[].restartCount] | add else 0 end),
      age: ((now - (.metadata.creationTimestamp | fromdateiso8601)) | if . >= 86400 then (. / 86400 | floor | tostring) + "d" elif . >= 3600 then (. / 3600 | floor | tostring) + "h" elif . >= 60 then (. / 60 | floor | tostring) + "m" else (. | floor | tostring) + "s" end),
      ip: .status.podIP,
      node: .spec.nodeName
    }]' /tmp/list.json > /artifacts/output.json
  fi
  echo "Pods retrieved successfully"
