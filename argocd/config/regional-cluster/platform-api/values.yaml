# Default values for platform-api

global:
  git_revision: "unknown"

platformApi:
  # Namespace to deploy into
  namespace: platform-api

  # Service Account configuration
  serviceAccount:
    create: true
    name: platform-api-sa
    annotations: {}

  # Application configuration
  app:
    name: platform-api
    image:
      repository: quay.io/slopezz/rosa-regional-platform-api
      tag: "6f65042"
      pullPolicy: Always

    # Application arguments
    args:
      logLevel: info
      logFormat: json
      maestroUrl: http://maestro-http.maestro-server:8080
      allowedAccounts: "123456789012"
      dynamodbRegion: us-east-2
      dynamodbPrefix: rosa
      apiPort: 8000
      healthPort: 8081
      metricsPort: 9090

    # Resources for the main app container
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Envoy sidecar configuration
  envoy:
    image:
      repository: envoyproxy/envoy
      tag: v1.31-latest

    # Resources for the Envoy sidecar
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Deployment configuration
  deployment:
    replicas: 2

  # Service configuration
  service:
    type: ClusterIP
    ports:
      http: 8080
      api: 8000
      health: 8081
      metrics: 9090

  # Target Group configuration
  targetGroup:
    arn: "PLACEHOLDER"
    targetType: ip

  # ZOA (Zero Operator Access) configuration
  zoa:
    enabled: true
    tableName: ""
    auditTableName: ""
    bucketName: ""
    jobImage: "quay.io/slopezz/zoa-tools:10b4efd"
    ttlSeconds: "3600"
    executionTimeoutSeconds: "1800"
    writeCooldownSeconds: "300"
    maxConcurrentPerTarget: "10"
    dynamodbTTLDays: "365"
    jobResources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

  # Health probe configuration
  probes:
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
