apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hcp-state
  namespace: thanos
  labels:
    app.kubernetes.io/name: alerting-rules
    app.kubernetes.io/managed-by: Helm
    operator.thanos.io/prometheus-rule: "true"
spec:
  groups:
    - name: hcp-state-recording
      interval: 1m
      rules:
        # 1 when the HostedCluster Available condition is True, 0 otherwise.
        # max handles deduplication across Prometheus HA replicas.
        - record: hcp:hostedcluster_available
          expr: |
            max by (namespace, name, cluster) (
              kube_customresource_hostedcluster_status_condition{
                type="KubeAPIServerAvailable",
                status="True",
                cluster_type="management-cluster"
              }
            )

        # Clusters that have never been available.
        # Stops being emitted once HasBeenAvailable annotation is set.
        # label_replace maps exported_namespace → namespace for join.
        - record: hcp:lifecycle_installing
          expr: |
            label_replace(
              hypershift_cluster_waiting_initial_availability_duration_seconds{cluster_type="management-cluster"},
              "namespace", "$1", "exported_namespace", "(.*)"
            )

        # Clusters actively being deleted.
        - record: hcp:lifecycle_deleting
          expr: |
            label_replace(
              hypershift_cluster_deleting_duration_seconds{cluster_type="management-cluster"},
              "namespace", "$1", "exported_namespace", "(.*)"
            )
