apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: remote-write-health
  namespace: thanos
  labels:
    app.kubernetes.io/name: alerting-rules
    app.kubernetes.io/managed-by: Helm
    operator.thanos.io/prometheus-rule: "true"
spec:
  groups:
    - name: remote-write-health
      rules:
        - alert: PrometheusRemoteWriteDown_RC
          expr: absent(up{job="kubelet", cluster="{{ .Values.global.cluster_name }}"})
          for: 5m
          labels:
            severity: critical
            cluster: "{{ .Values.global.cluster_name }}"
            cluster_type: regional
          annotations:
            summary: "RC Prometheus has stopped shipping metrics to Thanos"
            description: "Regional cluster {{ .Values.global.cluster_name }} has not sent metrics for over 5 minutes. Remote-write is cluster-local (Prometheus → Thanos Receive in-cluster)."
{{- $raw := .Values.global.management_clusters | default "" }}
{{- range $entry := splitList "," $raw }}
{{- $parts := splitList ":" $entry }}
{{- if ge (len $parts) 2 }}
{{- $mcName := index $parts 0 }}
{{- $shortName := regexReplaceAll ".*-(mc[0-9]+)$" $mcName "${1}" | upper }}
        - alert: PrometheusRemoteWriteDown_{{ $shortName }}
          expr: absent(up{job="kubelet", cluster="{{ $mcName }}"})
          for: 5m
          labels:
            severity: critical
            cluster: "{{ $mcName }}"
            cluster_type: management
          annotations:
            summary: "{{ $shortName }} Prometheus has stopped shipping metrics to Thanos"
            description: "Management cluster {{ $mcName }} has not sent metrics for over 5 minutes. Remote-write path: Prometheus → sigv4-proxy → RHOBS API Gateway → Thanos Receive on RC."
{{- end }}
{{- end }}
