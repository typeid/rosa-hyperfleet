prometheus-yet-another-cloudwatch-exporter:
  fullnameOverride: cloudwatch-exporter

  serviceAccount:
    create: true
    name: cloudwatch-exporter

  # The subchart's ConfigMap uses `tpl` so Helm templates inside `config:`
  # are rendered at deploy time. global.* values are passed automatically.
  # The subchart's Deployment includes a checksum/config annotation that
  # triggers an automatic rollout whenever the config content changes.
  configMap:
    enabled: true

  config: |
    apiVersion: v1alpha1
    sts-region: {{ .Values.global.aws_region }}
    static:
      - namespace: AWS/EKS
        name: {{ .Values.global.cluster_name }}
        regions:
          - {{ .Values.global.aws_region }}
        dimensions:
          - name: ClusterName
            value: {{ .Values.global.cluster_name }}
        metrics:
          - name: apiserver_storage_size_bytes
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Maximum]
          - name: scheduler_schedule_attempts_total
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]
          - name: scheduler_pending_pods
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]
          - name: scheduler_pending_pods_UNSCHEDULABLE
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]
          - name: scheduler_pending_pods_GATED
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]

    discovery:
      jobs:
        - type: AWS/ApiGateway
          regions:
            - {{ .Values.global.aws_region }}
          searchTags:
            - key: Name
              value: ^{{ .Values.global.cluster_name }}-
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: Count
              statistics: [SampleCount]
              nilToZero: true
            - name: Latency
              statistics: [Average, p50, p99]
              nilToZero: true
            - name: IntegrationLatency
              statistics: [Average, p50, p99]
              nilToZero: true
            - name: 4XXError
              statistics: [Sum]
              nilToZero: true
            - name: 5XXError
              statistics: [Sum]
              nilToZero: true

        - type: AWS/RDS
          regions:
            - {{ .Values.global.aws_region }}
          searchTags:
            - key: Name
              value: ^{{ .Values.global.cluster_name }}-
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: CPUUtilization
              statistics: [Average]
              nilToZero: true
            - name: FreeableMemory
              statistics: [Average]
              nilToZero: true
            - name: SwapUsage
              statistics: [Average]
              nilToZero: true
            - name: DatabaseConnections
              statistics: [Sum]
              nilToZero: true
            - name: DiskQueueDepth
              statistics: [Average]
              nilToZero: true
            - name: ReadIOPS
              statistics: [Average]
              nilToZero: true
            - name: WriteIOPS
              statistics: [Average]
              nilToZero: true
            - name: ReadLatency
              statistics: [Average]
              nilToZero: true
            - name: WriteLatency
              statistics: [Average]
              nilToZero: true
            - name: Deadlocks
              statistics: [Sum]
              nilToZero: true
            - name: MaximumUsedTransactionIDs
              statistics: [Average]
              nilToZero: true
            - name: NetworkReceiveThroughput
              statistics: [Average]
              nilToZero: true
            - name: NetworkTransmitThroughput
              statistics: [Average]
              nilToZero: true
            - name: VolumeBytesUsed
              statistics: [Average]
              nilToZero: true
            - name: VolumeReadIOPs
              statistics: [Average]
              nilToZero: true
            - name: VolumeWriteIOPs
              statistics: [Average]
              nilToZero: true

        - type: AWS/ApplicationELB
          regions:
            - {{ .Values.global.aws_region }}
          searchTags:
            - key: Name
              value: ^{{ .Values.global.cluster_name }}-(api|rhobs)$
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: HealthyHostCount
              statistics: [Minimum]
              nilToZero: true
            - name: UnHealthyHostCount
              statistics: [Maximum]
              nilToZero: true
            - name: TargetResponseTime
              statistics: [Average, p99]
              nilToZero: true
            - name: RequestCount
              statistics: [Sum]
              nilToZero: true
            - name: HTTPCode_Target_2XX_Count
              statistics: [Sum]
              nilToZero: true
            - name: HTTPCode_Target_4XX_Count
              statistics: [Sum]
              nilToZero: true
            - name: HTTPCode_Target_5XX_Count
              statistics: [Sum]
              nilToZero: true
            - name: HTTPCode_ELB_5XX_Count
              statistics: [Sum]
              nilToZero: true
            - name: ActiveConnectionCount
              statistics: [Sum]
              nilToZero: true

        - type: AWS/DynamoDB
          regions:
            - {{ .Values.global.aws_region }}
          searchTags:
            - key: Name
              value: ^{{ .Values.global.cluster_name }}-
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: ConsumedReadCapacityUnits
              statistics: [Sum]
              nilToZero: true
            - name: ConsumedWriteCapacityUnits
              statistics: [Sum]
              nilToZero: true
            - name: ThrottledRequests
              statistics: [Sum]
              nilToZero: true
            - name: SystemErrors
              statistics: [Sum]
              nilToZero: true
            - name: UserErrors
              statistics: [Sum]
              nilToZero: true
            - name: SuccessfulRequestLatency
              statistics: [Average, p99]
              nilToZero: true

        - type: AWS/CertificateManager
          regions:
            - {{ .Values.global.aws_region }}
          searchTags:
            - key: Name
              value: ^{{ .Values.global.cluster_name }}-api-cert$
          period: 86400
          length: 86400
          delay: 3600
          metrics:
            - name: DaysToExpiry
              statistics: [Minimum]
              nilToZero: true

  # FedRAMP SC-13 / IA-07: Use FIPS 140-2 validated AWS API endpoints.
  extraArgs:
    fips: true
    # How often YACE polls the CloudWatch API. Must match serviceMonitor.interval
    # to avoid storing duplicate samples between refreshes.
    scraping-interval: 120

  serviceMonitor:
    enabled: true
    # Must match extraArgs.scraping-interval to avoid redundant scrapes.
    interval: 120s
    metricRelabelings:
      - action: labeldrop
        regex: "instance|pod"

  # FedRAMP: non-root with read-only root filesystem
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  aws:
    role: ""
