hyperfleet-operator-chart:
  applicationName: hyperfleet-operator

  namespace: argocd

  targetNamespace: hyperfleet-system

  project: default

  source:
    repoURL: https://github.com/typeid/hyperfleet-operator.git
    targetRevision: single_dynamodb
    path: charts/hyperfleet-operator

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  helmValues:
    image:
      repository: quay.io/cbusse_openshift/hyperfleet-operator
      tag: "single_dynamodb_a"
      pullPolicy: Always

    replicaCount: 1

    leaderElection:
      enabled: true

    serviceAccount:
      create: true
      name: hyperfleet-operator
      annotations: {}

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
