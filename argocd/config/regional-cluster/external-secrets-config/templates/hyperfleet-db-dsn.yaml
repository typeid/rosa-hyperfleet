apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hyperfleet-db-dsn
  namespace: hyperfleet
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: hyperfleet-db-dsn
    creationPolicy: Owner
  data:
    - secretKey: dsn
      remoteRef:
        key: {{ .Values.global.cluster_name }}-hyperfleet-db-dsn
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
