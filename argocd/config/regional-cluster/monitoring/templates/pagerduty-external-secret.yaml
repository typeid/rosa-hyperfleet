{{- if .Values.pagerduty.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pagerduty-integration-key
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: pagerduty-integration-key
    creationPolicy: Owner
  data:
    - secretKey: integration_key
      remoteRef:
        key: {{ .Values.global.cluster_name }}-pagerduty-integration-key
        property: integration_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
