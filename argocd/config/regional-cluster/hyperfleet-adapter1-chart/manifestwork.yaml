{{- $hash4 := printf "%.4s" .clusterId -}}
apiVersion: work.open-cluster-management.io/v1
kind: ManifestWork
metadata:
  name: "work-{{ .clusterId }}"
  labels:
    # HyperFleet tracking labels
    hyperfleet.io/cluster-id: "{{ .clusterId }}"
    hyperfleet.io/adapter: "{{ .adapterName }}"
    hyperfleet.io/component: "infrastructure"
    hyperfleet.io/generation: "{{ .generation }}"
    hyperfleet.io/resource-group: "cluster-setup"

    # Maestro-specific labels
    maestro.io/source-id: "{{ .adapterName }}"
    maestro.io/resource-type: "manifestwork"
    maestro.io/priority: "normal"

    # Standard Kubernetes application labels
    app.kubernetes.io/name: "rosa-hcp-cluster"
    app.kubernetes.io/instance: "{{ .clusterId }}"
    app.kubernetes.io/version: "v1.0.0"
    app.kubernetes.io/component: "infrastructure"
    app.kubernetes.io/part-of: "hyperfleet"
    app.kubernetes.io/managed-by: "hyperfleet-adapter"
    app.kubernetes.io/created-by: "{{ .adapterName }}"

  # Annotations for metadata and operational information
  annotations:
    # Tracking and lifecycle
    hyperfleet.io/created-by: "hyperfleet-adapter-framework"
    hyperfleet.io/managed-by: "{{ .adapterName }}"
    hyperfleet.io/generation: "{{ .generation }}"
    hyperfleet.io/cluster-name: "{{ .clusterId }}"
    hyperfleet.io/deployment-time: "{{ .timestamp }}"

    # Maestro-specific annotations
    maestro.io/applied-time: "{{ .timestamp }}"
    maestro.io/source-adapter: "{{ .adapterName }}"

    # Operational annotations
    deployment.hyperfleet.io/strategy: "rolling"
    deployment.hyperfleet.io/timeout: "300s"
    monitoring.hyperfleet.io/enabled: "true"

spec:
  workload:
    manifests:
      - apiVersion: v1
        kind: Namespace
        metadata:
          name: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/managed-by: "{{ .adapterName }}"
            hyperfleet.io/resource-type: "namespace"
          annotations:
            hyperfleet.io/created-by: "hyperfleet-adapter"
            hyperfleet.io/generation: "{{ .generation }}"
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "cluster-config"
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        data:
          cluster_id: "{{ .clusterId }}"
          cluster_name: "{{ .clusterName }}"

      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: pull-secret
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
            hyperfleet.io/resource-type: "pull-secret"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        spec:
          refreshInterval: 1h
          secretStoreRef:
            name: "aws-parameter-store"
            kind: ClusterSecretStore
          target:
            name: pull-secret
            creationPolicy: Orphan
            template:
              type: kubernetes.io/dockerconfigjson
          data:
            - secretKey: .dockerconfigjson
              remoteRef:
                key: /infra/pull-secret

      - apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: api-serving-cert
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        spec:
          secretName: api-serving-cert
          issuerRef:
            name: letsencrypt-dns01
            kind: ClusterIssuer
          dnsNames:
            - "api.{{ .clusterName }}.{{ $hash4 }}.{{ .baseDomain }}"

      - apiVersion: hypershift.openshift.io/v1beta1
        kind: HostedCluster
        metadata:
          name: "{{ .clusterName }}"
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
            hypershift.openshift.io/pod-security-admission-label-override: privileged
            # Self-built image using 4.22 branch and cherrypicking the following PRs on top off main (5.0.0 target):
            # - https://github.com/openshift/hypershift/pull/8343 / OCPBUGS-84508 
            # - https://github.com/openshift/hypershift/pull/8344 / OCPBUGS-84509
            # - https://github.com/openshift/hypershift/pull/8357 / OCPBUGS-84572
            # - https://github.com/openshift/hypershift/pull/8458 / OCPBUGS-85243
            # We cannot use 5.0.0 because it just branched and is in a broken state.
            # Once we backport the above fixes to 4.22, we can use a somewhat stable 4.22 build.
            hypershift.openshift.io/control-plane-operator-image: quay.io/cbusse_openshift/control-plane-operator:eks-compat-4.22-cfe86d4436
        spec:
          infraID: "{{ .clusterId }}"
          dns:
            # TODO(ROSAENG-1089): hash4 is currently a naive truncation of clusterId.
            # CLM must guarantee uniqueness within a zone shard before production.
            baseDomain: "{{ $hash4 }}.{{ .baseDomain }}"
          fips: true
          release:
            image: quay.io/openshift-release-dev/ocp-release:4.22.0-rc.1-multi
          pullSecret:
            name: pull-secret
          sshKey:
            name: ssh-key
          networking:
            clusterNetwork:
              - cidr: 10.132.0.0/14
            serviceNetwork:
              - cidr: 172.31.0.0/16
            machineNetwork:
              - cidr: 10.0.0.0/16
            networkType: OVNKubernetes
          platform:
            type: AWS
            aws:
              region: "{{ .region }}"
              cloudProviderConfig:
                vpc: "{{ .vpcId }}"
                # Workaround(typeid): CCM uses zone, e.g. `us-east-1a` and cuts off the last char to get the region when no IDMS is available (= on EKS).
                # This has no impact on ability to use multi-az, but we will want this fixed to clean up our manifestwork. 
                # TODO: Remove once fix lands in our OCP payloads. 
                # Tracker: OCPBUGS-84562 
                zone: "{{ .zone }}" 
                subnet:
                  id: "{{ .subnetId }}"
              endpointAccess: PublicAndPrivate
              rolesRef:
                controlPlaneOperatorARN: "{{ .controlPlaneOperatorARN }}"
                ingressARN: "{{ .ingressARN }}"
                imageRegistryARN: "{{ .imageRegistryARN }}"
                kubeCloudControllerARN: "{{ .kubeCloudControllerARN }}"
                nodePoolManagementARN: "{{ .nodePoolManagementARN }}"
                networkARN: "{{ .networkARN }}"
                storageARN: "{{ .storageARN }}"
              resourceTags:
                - key: kubernetes.io/cluster/{{ .clusterId }}
                  value: owned
                - key: red-hat-managed
                  value: "true"
          configuration:
            apiServer:
              servingCerts:
                namedCertificates:
                  - names:
                      - "api.{{ .clusterName }}.{{ $hash4 }}.{{ .baseDomain }}"
                    servingCertificate:
                      name: api-serving-cert
          issuerURL: "{{ .cloudUrl }}/{{ .clusterId }}"
          # On EKS (non-OpenShift), using Route with explicit hostnames for KAS
          # and OAuth forces HyperShift to deploy a dedicated HCP router, avoiding
          # the dependency on a management cluster OpenShift ingress controller.
          services:
            - service: APIServer
              servicePublishingStrategy:
                type: Route
                route:
                  hostname: "api.{{ .clusterName }}.{{ $hash4 }}.{{ .baseDomain }}"
            - service: OAuthServer
              servicePublishingStrategy:
                type: Route
                route:
                  hostname: "oauth.{{ .clusterName }}.{{ $hash4 }}.{{ .baseDomain }}"
            - service: Konnectivity
              servicePublishingStrategy:
                type: Route
            - service: Ignition
              servicePublishingStrategy:
                type: Route
          infrastructureAvailabilityPolicy: SingleReplica
          controllerAvailabilityPolicy: SingleReplica
      - apiVersion: hypershift.openshift.io/v1beta1
        kind: NodePool
        metadata:
          name: "{{ .clusterName }}-workers"
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        spec:
          clusterName: "{{ .clusterName }}"
          replicas: 2
          management:
            autoRepair: true
            upgradeType: Replace
          release:
            image: quay.io/openshift-release-dev/ocp-release:4.21.1-multi
          platform:
            type: AWS
            aws:
              instanceType: m6a.xlarge
              rootVolume:
                size: 120
                type: gp3
              subnet:
                id: "{{ .subnetId }}"
              instanceProfile: "{{ .instanceProfile }}"
              securityGroups:
                - id: "{{ .securityGroupId }}"
              resourceTags:
                - key: red-hat-managed
                  value: "true"
      - apiVersion: v1
        kind: Secret
        metadata:
          name: ssh-key
          namespace: "clusters-{{ .clusterId }}"
          labels:
            hyperfleet.io/cluster-id: "{{ .clusterId }}"
          annotations:
            hyperfleet.io/generation: "{{ .generation }}"
        type: Opaque
        data:
          id_rsa.pub: ""

  deleteOption:
      propagationPolicy: "Foreground"
      gracePeriodSeconds: 30

  manifestConfigs:
    - resourceIdentifier:
        group: ""
        resource: "namespaces"
        name: "clusters-{{ .clusterId }}"
      updateStrategy:
        type: "ServerSideApply"
      feedbackRules:
        - type: "JSONPaths"
          jsonPaths:
            - name: "phase"
              path: ".status.phase"
            - name: "conditions"
              path: ".status.conditions"
            - name: "creationTimestamp"
              path: ".metadata.creationTimestamp"

    - resourceIdentifier:
        group: "hypershift.openshift.io"
        resource: "hostedclusters"
        namespace: "clusters-{{ .clusterId }}"
        name: "{{ .clusterName }}"
      updateStrategy:
        type: "ServerSideApply"
      feedbackRules:
        - type: "JSONPaths"
          jsonPaths:
            - name: "availableCondition"
              path: ".status.conditions[?(@.type==\"Available\")].status"
            - name: "degradedCondition"
              path: ".status.conditions[?(@.type==\"Degraded\")].status"
            - name: "controlPlaneEndpoint"
              path: ".status.controlPlaneEndpoint.host"
            - name: "version"
              path: ".status.version.history[0].version"
