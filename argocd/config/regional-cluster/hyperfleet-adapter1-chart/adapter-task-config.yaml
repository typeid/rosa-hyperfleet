params:
  - name: "clusterId"
    source: "event.id"
    type: "string"
    required: true
  - name: "generation"
    source: "event.generation"
    type: "int"
    required: true
  - name: "managementClusterName"
    source: "env.MANAGEMENT_CLUSTER_NAME"
    type: "string"
    required: true
  - name: "baseDomain"
    source: "env.BASE_DOMAIN"
    type: "string"
    required: true

preconditions:
  - name: "clusterStatus"
    api_call:
      method: "GET"
      url: "/clusters/{{ .clusterId }}"
      timeout: 10s
      retry_attempts: 3
      retry_backoff: "exponential"
    capture:
      - name: "clusterName"
        field: "name"
      - name: "apiGeneration"
        field: "generation"
      - name: "timestamp"
        field: "created_time"
      - name: "readyConditionStatus"
        expression: |
          status.conditions.filter(c, c.type == "Ready").size() > 0
            ? status.conditions.filter(c, c.type == "Ready")[0].status
            : "False"

      - name: "specDeletionRequested"
        expression: |
          has(spec.deletionRequested) && spec.deletionRequested != ""
            ? "True"
            : "False"

      # expression: "\"mc01\""  # TBC coming from placement adapter
      - name: "placementClusterName"
        expression: |
          has(spec.placement) && spec.placement != ""
            ? spec.placement
            : "mc01"

      - name: "adapterName"
        expression: "\"adapter1\""  # TBC coming from config passed to params

      # Workaround(typeid): CCM uses zone, e.g. `us-east-1a` and cuts off the last char to get the region when no IDMS is available (= on EKS).
      # This has no impact on ability to use multi-az, but we will want this fixed to clean up our manifestwork. 
      # TODO: Remove once fix lands in our OCP payloads. 
      # Tracker: OCPBUGS-84562 
      - name: "zone"
        expression: |
          has(spec.zone) && spec.zone != ""
            ? spec.zone
            : "us-east-1a"

      - name: "region"
        expression: |
          has(spec.region) && spec.region != ""
            ? spec.region
            : "us-east-1"
      - name: "vpcId"
        expression: |
          has(spec.vpcId) && spec.vpcId != ""
            ? spec.vpcId
            : ""
      - name: "subnetId"
        expression: |
          has(spec.privateSubnetIds) && spec.privateSubnetIds != ""
            ? spec.privateSubnetIds
            : ""
      - name: "instanceProfile"
        expression: |
          has(spec.workerInstanceProfileName) && spec.workerInstanceProfileName != ""
            ? spec.workerInstanceProfileName
            : ""
      - name: "securityGroupId"
        expression: |
          has(spec.workerSecurityGroupId) && spec.workerSecurityGroupId != ""
            ? spec.workerSecurityGroupId
            : ""
      - name: "controlPlaneOperatorARN"
        expression: |
          has(spec.controlPlaneOperatorRoleArn) && spec.controlPlaneOperatorRoleArn != ""
            ? spec.controlPlaneOperatorRoleArn
            : ""
      - name: "ingressARN"
        expression: |
          has(spec.ingressRoleArn) && spec.ingressRoleArn != ""
            ? spec.ingressRoleArn
            : ""
      - name: "imageRegistryARN"
        expression: |
          has(spec.imageRegistryRoleArn) && spec.imageRegistryRoleArn != ""
            ? spec.imageRegistryRoleArn
            : ""
      - name: "kubeCloudControllerARN"
        expression: |
          has(spec.cloudControllerManagerRoleArn) && spec.cloudControllerManagerRoleArn != ""
            ? spec.cloudControllerManagerRoleArn
            : ""
      - name: "nodePoolManagementARN"
        expression: |
          has(spec.nodePoolManagementRoleArn) && spec.nodePoolManagementRoleArn != ""
            ? spec.nodePoolManagementRoleArn
            : ""
      - name: "networkARN"
        expression: |
          has(spec.networkConfigRoleArn) && spec.networkConfigRoleArn != ""
            ? spec.networkConfigRoleArn
            : ""
      - name: "storageARN"
        expression: |
          has(spec.ebscsiRoleArn) && spec.ebscsiRoleArn != ""
            ? spec.ebscsiRoleArn
            : ""
      - name: "cloudUrl"
        expression: "spec.cloudUrl"

    # check if the cluster is not ready
    conditions:
      - field: "readyConditionStatus"
        operator: "equals"
        value: "False"
      - field: "specDeletionRequested"
        operator: "equals"
        value: "False"

  - name: "validationCheck"
    # Valid CEL expression
    expression: |
      readyConditionStatus == "False" && specDeletionRequested == "False"

# Resources with valid K8s manifests
resources:
  - name: "hostedClusterBundle"
    transport:
      client: "maestro"
      maestro:
        target_cluster: "{{ .placementClusterName }}"
    manifest:
      ref: "/etc/adapter/manifestwork.yaml"

    discovery:
      by_name: "work-{{ .clusterId }}"

    nested_discoveries:
      - name: "clusterNamespace"
        discovery:
          by_selectors:
            label_selector:
              hyperfleet.io/resource-type: "namespace"
              hyperfleet.io/cluster-id: "{{ .clusterId }}"  
      - name: "hostedCluster"
        discovery:
          by_name: "{{ .clusterName }}"
      - name: "clusterConfig"
        discovery:
          by_name: "cluster-config"
          namespace: "{{ .clusterId }}"

post:
  payloads:
    - name: "clusterStatusPayload"
      build:
        adapter: "{{ .adapterName }}"
        conditions:
          - type: "Applied"
            status:
              expression: |
                has(resources.hostedClusterBundle) && has(resources.hostedClusterBundle.status)
                && has(resources.hostedClusterBundle.status.conditions)
                && resources.hostedClusterBundle.status.conditions.filter(c, has(c.type) && c.type == "Applied").size() > 0
                ? resources.hostedClusterBundle.status.conditions.filter(c, c.type == "Applied")[0].status
                : "False"
            reason:
              expression: |
                has(resources.hostedClusterBundle) && has(resources.hostedClusterBundle.status)
                && has(resources.hostedClusterBundle.status.conditions)
                && resources.hostedClusterBundle.status.conditions.filter(c, has(c.type) && c.type == "Applied").size() > 0
                ? resources.hostedClusterBundle.status.conditions.filter(c, c.type == "Applied")[0].reason
                : "ManifestWorkNotApplied"
            message:
              expression: |
                has(resources.hostedClusterBundle) && has(resources.hostedClusterBundle.status)
                && has(resources.hostedClusterBundle.status.conditions)
                && resources.hostedClusterBundle.status.conditions.filter(c, has(c.type) && c.type == "Applied").size() > 0
                ? resources.hostedClusterBundle.status.conditions.filter(c, c.type == "Applied")[0].message
                : "ManifestWork not yet applied by Maestro agent"

          # Health: HostedCluster not degraded (fed back via manifestConfigs)
          - type: "Health"
            status:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "degradedCondition")
                ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "degradedCondition")[0].fieldValue.string == "False"
                  ? "True" : "False")
                : "False"
            reason:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "degradedCondition")
                ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "degradedCondition")[0].fieldValue.string == "False"
                  ? "NotDegraded" : "HostedClusterDegraded")
                : "StatusNotReady"
            message:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "degradedCondition")
                ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "degradedCondition")[0].fieldValue.string == "False"
                  ? "HostedCluster is healthy"
                  : "HostedCluster is degraded")
                : "Waiting for HostedCluster status feedback"

          - type: "Available"
            status:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "availableCondition")
                ? resources.hostedCluster.statusFeedback.values.filter(v, v.name == "availableCondition")[0].fieldValue.string
                : "False"
            reason:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "availableCondition")
                ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "availableCondition")[0].fieldValue.string == "True"
                  ? "HostedClusterAvailable" : "HostedClusterNotAvailable")
                : "StatusNotReady"
            message:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "availableCondition")
                ? (resources.hostedCluster.statusFeedback.values.filter(v, v.name == "availableCondition")[0].fieldValue.string == "True"
                  ? "HostedCluster is available"
                  : "HostedCluster not yet available")
                : "Waiting for HostedCluster status feedback"

        # Use CEL expression for numeric fields to preserve type (not Go template which outputs strings)
        observed_generation:
          expression: "generation"
        observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"

        data:
          namespace:
            name:
              expression: |
                resources.?clusterNamespace.?metadata.?name.orValue("")
            creationTimestamp:
              expression: |
                resources.?clusterNamespace.?metadata.?creationTimestamp.orValue("")
          hostedCluster:
            name:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.metadata)
                ? resources.hostedCluster.metadata.name
                : ""
            apiEndpoint:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "controlPlaneEndpoint")
                ? "https://" + resources.hostedCluster.statusFeedback.values.filter(v, v.name == "controlPlaneEndpoint")[0].fieldValue.string
                : ""
            version:
              expression: |
                has(resources.hostedCluster) && has(resources.hostedCluster.statusFeedback)
                && has(resources.hostedCluster.statusFeedback.values)
                && resources.hostedCluster.statusFeedback.values.exists(v, has(v.name) && v.name == "version")
                ? resources.hostedCluster.statusFeedback.values.filter(v, v.name == "version")[0].fieldValue.string
                : ""

  post_actions:
    - name: "reportClusterStatus"
      api_call:
        method: "POST"
        url: "/clusters/{{ .clusterId }}/statuses"
        headers:
          - name: "Content-Type"
            value: "application/json"
        body: "{{ .clusterStatusPayload }}"
