hyperfleet:
  applicationName: hyperfleet-operator

  namespace: argocd

  targetNamespace: hyperfleet

  project: default

  source:
    repoURL: https://github.com/typeid/hyperfleet-operator.git
    targetRevision: pgruntime
    path: charts/hyperfleet-operator

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  helmValues:
    image:
      repository: quay.io/psav/hyperfleet-operator
      tag: "delete-desires-f279b75"
      pullPolicy: Always

    replicaCount: 2

    hyperfleetdb:
      bucketCount: 32

    serviceAccount:
      create: true
      name: hyperfleet-operator
      annotations: {}

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
